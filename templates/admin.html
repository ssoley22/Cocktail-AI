<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="/static/css/base.css">
    <title>Panell de Control - Admin</title>
    <style>
        body { text-align: center; padding: 30px; }

        .admin-header {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            margin-bottom: 4px;
        }
        .admin-header-dreta { display: flex; align-items: center; gap: 20px; justify-content: flex-end; }
        .link-clients { color: var(--color-text-fosc); text-decoration: none; font-size: 0.85rem; transition: 0.3s; }
        .link-clients:hover { color: var(--color-primari); }
        .btn-logout { text-decoration: none; color: var(--color-error); font-weight: bold; border: 1px solid var(--color-error); padding: 6px 14px; border-radius: 8px; font-size: 0.85rem; transition: 0.3s; }
        .btn-logout:hover { background: rgba(255,75,75,0.1); }

        h1 { color: var(--color-primari); margin: 0; }

        .tabs-container {
            display: flex; justify-content: center;
            border-bottom: 1px solid var(--color-vora-subtil);
            margin: 24px 0 0;
        }
        .tab {
            padding: 20px 40px; font-size: 1rem; font-weight: bold;
            color: var(--color-text-fosc); text-decoration: none;
            border-bottom: 3px solid transparent;
            transition: 0.3s; letter-spacing: 1px;
            display: flex; align-items: center; gap: 8px;
        }
        .tab:hover { color: var(--color-primari); }
        .tab.actiu { color: var(--color-primari); border-bottom-color: var(--color-primari); }
        .tab.bloquejat { opacity: 0.35; cursor: not-allowed; pointer-events: none; }

        .seccio-contingut { width: fit-content; margin: 30px auto; }

        .taula-wrapper { background: var(--color-superficie); border-radius: 16px; overflow: hidden; border: 1px solid var(--color-vora-subtil); }
        table { border-collapse: collapse; }
        thead tr { background: var(--color-superficie-2); }
        th { padding: 14px 24px; text-align: center; color: var(--color-text-gris); font-size: 0.75rem; letter-spacing: 1px; }
        td { padding: 12px 24px; border-top: 1px solid var(--color-vora-subtil); text-align: center; }

        select { background: #1e2235; color: white; border: 1px solid var(--color-vora); padding: 8px 12px; border-radius: 8px; font-size: 0.9rem; cursor: pointer; outline: none; }
        select:focus { border-color: var(--color-primari); }

        input[type="number"] { background: #1e2235; color: white; border: 1px solid var(--color-vora); padding: 8px 12px; border-radius: 8px; font-size: 0.9rem; width: 90px; text-align: center; outline: none; }
        input[type="number"]:focus { border-color: var(--color-primari); }

        .btn-desar { background: var(--color-primari); color: white; border: none; padding: 8px 18px; border-radius: 8px; font-size: 0.8rem; font-weight: bold; letter-spacing: 0.5px; cursor: pointer; transition: 0.3s; }
        .btn-desar:hover { background: var(--color-primari-clar); }
    </style>
</head>
<body>

    <div class="admin-header">
        <div></div>
        <h1>Tauler de Control</h1>
        <div class="admin-header-dreta">
            <a href="/" class="link-clients">← Web de Clients</a>
            <a href="/logout" class="btn-logout">SORTIR</a>
        </div>
    </div>

    <div class="tabs-container">
        <a href="#carrils" class="tab actiu">🧪 Carrils</a>
        <span class="tab bloquejat">📊 Estadístiques</span>
        <span class="tab bloquejat">📝 Receptes</span>
    </div>

    <div class="seccio-contingut" id="carrils">
        <div class="taula-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>POS</th>
                        <th>LÍQUID</th>
                        <th>CAPACITAT (ML)</th>
                        <th>ACCIÓ</th>
                    </tr>
                </thead>
                <tbody>
                    {% for fila in carrils %}
                    <tr>
                        <form action="/guardar_carril" method="POST">
                            <td>{{ fila.Posicio }}<input type="hidden" name="posicio" value="{{ fila.Posicio }}"></td>
                            <td>
                                <select name="id_ingredient">
                                    {% for ing in liquids %}
                                    <option value="{{ ing.ID_Ingredient }}" {% if ing.ID_Ingredient == fila.ID_Ingredient %}selected{% endif %}>
                                        {{ ing.Nom_Liquid }}
                                    </option>
                                    {% endfor %}
                                </select>
                            </td>
                            <td><input type="number" name="ml" value="{{ fila.Capacitat_Actual_ml }}"></td>
                            <td><button type="submit" class="btn-desar">DESAR</button></td>
                        </form>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>

</body>
</html>
