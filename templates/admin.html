<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <title>Panell de Control - Admin</title>
    <style>
        body { background-color: #05050a; color: white; font-family: sans-serif; text-align: center; margin: 0; }
        
        .admin-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 30px; background-color: #0a0b16; border-bottom: 1px solid #222;
        }
        
        .btn-logout {
            text-decoration: none; color: #ff4b4b; font-weight: bold;
            border: 1px solid #ff4b4b; padding: 5px 12px; border-radius: 8px;
        }

        /* El nou menú de botons */
        .menu-admin {
            display: flex; justify-content: center; gap: 20px; margin: 40px 0;
        }

        .boto-config {
            background: #121421; border: 1px solid #7b61ff; color: white;
            padding: 20px 30px; border-radius: 12px; cursor: pointer;
            text-decoration: none; font-weight: bold; transition: 0.3s;
            display: flex; flex-direction: column; align-items: center; gap: 10px;
            width: 180px;
        }

        .boto-config:hover { background: #1a1d33; transform: translateY(-3px); box-shadow: 0 5px 15px rgba(123, 97, 255, 0.3); }
        
        .boto-config.actiu { background: #7b61ff; color: white; }
        
        .boto-config.bloquejat { opacity: 0.5; border-color: #444; cursor: not-allowed; }

        /* Estils taula */
        .seccio-contingut { width: 90%; margin: 0 auto; }
        table { margin: 20px auto; background-color: #121421; border-collapse: collapse; border-radius: 10px; overflow: hidden; }
        th, td { padding: 15px 20px; border-bottom: 1px solid #222; }
        select, input { background: #1c1f33; color: white; border: 1px solid #444; padding: 8px; border-radius: 5px; }
        .btn-save { background: none; border: none; cursor: pointer; font-size: 1.2rem; filter: sepia(1) hue-rotate(200deg); }
    </style>
</head>
<body>

    <div class="admin-header">
        <div style="color: #888;">Panell d'Administració</div>
        <a href="/logout" class="btn-logout">Sortir 🚪</a>
    </div>

    <h1>Tauler de Control</h1>

    <div class="menu-admin">
        <a href="#carrils" class="boto-config actiu">
            <span style="font-size: 2rem;">🧪</span>
            Configuració Carrils
        </a>
        
        <a href="#" class="boto-config bloquejat">
            <span style="font-size: 2rem;">📊</span>
            Estadístiques<br>(Properament)
        </a>

        <a href="#" class="boto-config bloquejat">
            <span style="font-size: 2rem;">📝</span>
            Gestió Receptes<br>(Properament)
        </a>
    </div>

    <hr style="border: 0; border-top: 1px solid #222; width: 80%;">

    <div class="seccio-contingut" id="carrils">
        <h2 style="color: #7b61ff; margin-top: 30px;">Estat dels 6 Carrils</h2>
        <table>
            <thead>
                <tr>
                    <th>Pos</th>
                    <th>Líquid</th>
                    <th>Capacitat (ml)</th>
                    <th>Acció</th>
                </tr>
            </thead>
            <tbody>
                {% for fila in carrils %}
                <tr>
                    <form action="/guardar_carril" method="POST">
                        <td>{{ fila.Posicio }}<input type="hidden" name="posicio" value="{{ fila.Posicio }}"></td>
                        <td>
                            <select name="id_ingredient">
                                {% for ing in liquids %}
                                <option value="{{ ing.ID_Ingredient }}" {% if ing.ID_Ingredient == fila.ID_Ingredient %}selected{% endif %}>
                                    {{ ing.Nom_Liquid }}
                                </option>
                                {% endfor %}
                            </select>
                        </td>
                        <td><input type="number" name="ml" value="{{ fila.Capacitat_Actual_ml }}"></td>
                        <td><button type="submit" class="btn-save">💾</button></td>
                    </form>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

    <p style="margin-bottom: 50px;"><a href="/" style="color: #7b61ff; text-decoration: none;">← Tornar a la Web de Clients</a></p>

</body>
</html>
