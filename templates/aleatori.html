<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="/static/css/base.css">
    <title>Sorprèn-me - Cocktail IA</title>
    <style>
        body { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
        }

        /* Contenidor central amb estil "sorpresa" */
        .container { 
            background: var(--color-superficie); 
            padding: 50px; 
            border-radius: 40px; 
            border: 2px dashed var(--color-primari); /* Marc clàssic de "sorpresa" */
            text-align: center; 
            max-width: 450px; 
            width: 90%; 
            box-shadow: 0 0 50px rgba(123, 97, 255, 0.15);
        }
        
        .icona-random { 
            font-size: 6rem; margin-bottom: 20px; 
            animation: bounce 1.5s infinite; 
            display: inline-block;
        }
        @keyframes bounce { 
            0%, 100% { transform: translateY(0) rotate(0deg); } 
            50% { transform: translateY(-15px) rotate(5deg); } 
        }

        h1 { color: var(--color-primari); font-size: 2.8rem; margin: 0; }
        .subtext { color: #555; text-transform: uppercase; letter-spacing: 3px; font-size: 0.8rem; margin-bottom: 10px; }
        .desc { color: #888; font-style: italic; margin: 20px 0 40px 0; min-height: 50px; line-height: 1.5; }

        .grup-accions { display: flex; flex-direction: column; gap: 15px; }
        
        /* Botó principal d'acceptar */
        .btn-si { 
            background: var(--color-primari); color: white; padding: 22px; border-radius: 20px; 
            text-decoration: none; font-weight: bold; font-size: 1.3rem; 
            transition: 0.3s; border: none; cursor: pointer;
            box-shadow: 0 10px 25px rgba(123, 97, 255, 0.3);
        }
        .btn-si:hover { background: var(--color-primari-clar); transform: scale(1.03); }

        /* Botó per tornar a provar sort */
        .btn-refresh { 
            background: transparent; color: var(--color-primari); padding: 15px; border-radius: 20px; 
            text-decoration: none; border: 1px solid var(--color-primari); font-weight: bold; 
            cursor: pointer; transition: 0.3s; 
        }
        .btn-refresh:hover { background: rgba(123, 97, 255, 0.1); }

    </style>
</head>
<body>

    <a href="/" class="btn-back">← INICI</a>

    <div class="container">
        <div class="icona-random">🎲</div>
        <p class="subtext">La teva sorpresa és:</p>
        <h1>{{ coctel.Nom_Coctel }}</h1>
        <p class="desc">"{{ coctel.Descripcio if coctel.Descripcio else "L'atzar ha parlat. T'atreveixes a provar aquesta combinació?" }}"</p>

        <div class="grup-accions">
            <a href="/confirmacio/{{ coctel.ID_Coctel }}?origen=/aleatori" class="btn-si">M'AGRADA, AQUEST! ✅</a>
            
            <a href="/aleatori" class="btn-refresh">PROVA SORT DE NOU 🔄</a>
        </div>
    </div>

</body>
</html>
