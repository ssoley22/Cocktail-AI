<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <title>Confirmar - Cocktail IA</title>
    <style>
        body { background: #05050a; color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .btn-back { position: fixed; top: 25px; left: 25px; color: #888; text-decoration: none; font-weight: bold; border: 1px solid #333; padding: 10px 15px; border-radius: 12px; background: rgba(18, 20, 33, 0.8); transition: 0.3s; }
        .btn-back:hover { color: #7b61ff; border-color: #7b61ff; }
        
        .box { background: #121421; padding: 50px; border-radius: 40px; border: 1px solid #333; text-align: center; max-width: 450px; width: 90%; margin: 20px 0; }
        h1 { color: #7b61ff; font-size: 2.5rem; margin-bottom: 10px; }
        
        .recepta { background: #0a0b16; padding: 20px; border-radius: 20px; text-align: left; margin: 25px 0; border: 1px solid #1a1d33; }
        
        /* SEGURETAT */
        .seguretat-container { margin-bottom: 25px; display: flex; flex-direction: column; gap: 20px; align-items: center; }
        .check-edat { display: flex; align-items: center; gap: 15px; color: #ccc; font-size: 1.1rem; cursor: pointer; }
        .check-edat input[type="checkbox"] { transform: scale(2.5); cursor: pointer; accent-color: #7b61ff; margin-right: 5px; }     
        .captcha-wrapper { display: flex; align-items: center; gap: 15px; background: #0a0b16; padding: 10px 20px; border-radius: 15px; border: 1px dashed #555; }
        .captcha-text { font-family: monospace; font-weight: bold; font-size: 1.6rem; color: #7b61ff; letter-spacing: 4px; }
        
        .captcha-input { background: transparent; border: 2px solid #444; color: white; width: 80px; padding: 10px; border-radius: 8px; text-align: center; outline: none; font-size: 1.2rem; text-transform: uppercase; }
        .captcha-input:focus { border-color: #7b61ff; }

        .btn-prep { width: 100%; padding: 20px; background: #7b61ff; color: white; border: none; border-radius: 20px; font-weight: bold; font-size: 1.2rem; cursor: pointer; box-shadow: 0 0 20px rgba(123, 97, 255, 0.3); transition: 0.3s; }
        .btn-prep:disabled { background: #222; color: #555; cursor: not-allowed; box-shadow: none; opacity: 0.5; }
        
        /* Etiqueta distintiva */
        .badge-alcohol { display: inline-block; padding: 5px 15px; border-radius: 10px; font-size: 0.8rem; font-weight: bold; margin-bottom: 10px; }
        .amb-alcohol { background: rgba(244, 67, 54, 0.1); color: #f44336; border: 1px solid #f44336; }
        .sense-alcohol { background: rgba(76, 175, 80, 0.1); color: #4caf50; border: 1px solid #4caf50; }
    </style>
</head>
<body>
    <a href="{{ origen }}" class="btn-back">← TORNAR</a>
    
    <div class="box">
        {% if coctel.Alcoholic == 1 %}
            <span class="badge-alcohol amb-alcohol">CONTÉ ALCOHOL 🔞</span>
        {% else %}
            <span class="badge-alcohol sense-alcohol">SENSE ALCOHOL ✨</span>
        {% endif %}

        <div style="font-size: 5rem;">🍹</div>
        <h1>{{ coctel.Nom_Coctel }}</h1>
        
        <div class="recepta">
            {% for ing in coctel.Recepta %}
            <div style="display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #1a1d33;">
                <span>{{ ing.Nom_Liquid }}</span>
                <span style="color: #7b61ff;">{{ ing.Quantitat_ml }}ml</span>
            </div>
            {% endfor %}
        </div>

        <form action="/preparar/{{ coctel.ID_Coctel }}" method="POST" id="confirm-form">
            
            {% if coctel.Alcoholic == 1 %}
            <div class="seguretat-container">
                <label class="check-edat">
                    <input type="checkbox" id="edat" required onchange="validar()">
                    Confirmo que soc major d'edat (+18)
                </label>

                <div class="captcha-wrapper">
                    <span class="captcha-text" id="captcha-code">----</span>
                    <input type="text" id="captcha-input" class="captcha-input" placeholder="Codi" maxlength="4" oninput="validar()">
                </div>
            </div>
            {% endif %}

            <button type="submit" id="btn-preparar" class="btn-prep" disabled>
                {% if disponible %}PREPARAR ARA{% else %}SENSE ESTOC{% endif %}
            </button>
        </form>
    </div>

    <script>
        const esAlcoholic = {{ 'true' if coctel.Alcoholic == 1 else 'false' }};
        const disponible = {{ 'true' if disponible else 'false' }};
        let codiGenerated = "";

        // Si és alcoholic, generem el captcha
        if (esAlcoholic) {
            codiGenerated = Math.random().toString(36).substring(2, 6).toUpperCase();
            document.getElementById('captcha-code').innerText = codiGenerated;
        }

        function validar() {
            const btn = document.getElementById('btn-preparar');
            
            if (!disponible) {
                btn.disabled = true;
                return;
            }

            if (esAlcoholic) {
                const isChecked = document.getElementById('edat').checked;
                const inputVal = document.getElementById('captcha-input').value.toUpperCase();
                btn.disabled = !(isChecked && inputVal === codiGenerated);
            } else {
                // Si no és alcoholic, el botó s'habilita sol (si hi ha estoc)
                btn.disabled = false;
            }
        }

        // Executar al carregar per si no és alcoholic
        window.onload = validar;
    </script>
</body>
</html>
