<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <title> Cocktail AI</title>
    <style>
        body{
            background-color: #03034b;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            padding: 40px 20px;
        }

        h1{
            color: #00f2ff
            text-shadow: 0 0 10px #00f2ff;
            font-size: 2.5rem;
        }

        p{
            color: #aaaaaa;
            margin-bottom: 30px;
        }

        .btn{
            background: #8a0c0c;
            color: white;
            border: 2px solid #00f2ff;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            max-width: 300px;
            margin: 10px auto;
            display: block;
            transition: 0.3s;       
        }
        .btn:hover{
            background: #00f2ff;
            color: black;
            border-color: 0 0 20px #00f2ff;
        }

        .btn-ia{
            border-color: #bc13fe;
            color: #bc13fe;
        }

        .btn-ia:hover{
            background: #bc13fe;
            color: white;
            border-color: 0 0 20px #bc13fe;
        }   
    </style>
</head>
<body>
    <h1>Benvinguts a Cocktail-AI </h1>
    <p> Tria el teu còctel preferit:</p>

    <button> Gin Tònic</button>
    <button class=""btn btn-ia">Demanar a la Ia </button>

</body>
</html>
