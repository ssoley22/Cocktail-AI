
<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <title>Cocktail AI 🍸</title> 
    <style>
        /* Fons de pantalla modern */
        body {
            background-color: #0b0d17; /* Blau nit molt fosc */
            color: white;
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            padding: 50px 20px;
        }

        h1 {
            font-size: 3rem;
            color: #00f2ff; /* Blau neó */
            text-shadow: 0 0 10px #00f2ff;
            margin-bottom: 40px;
        }

        /* Contenidor dels botons per posar-los un sota l'altre */
        .menu {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        /* El nou estil dels teus botons */
        .btn-menu {
            background-color: #1a1f35;
            color: #00f2ff;
            border: 2px solid #00f2ff;
            padding: 20px 40px;
            font-size: 1.5rem;
            border-radius: 15px;
            width: 80%;
            max-width: 400px;
            cursor: pointer;
            transition: all 0.3s ease; /* Efecte suau */
            font-weight: bold;
        }

        /* Quan el ratolí passa per sobre */
        .btn-menu:hover {
            background-color: #00f2ff;
            color: #0b0d17;
            box-shadow: 0 0 30px #00f2ff;
            transform: scale(1.05); /* Es fa una mica més gran */
        }

        /* Un color diferent per al botó de la IA */
        .ia {
            color: #bc13fe;
            border-color: #bc13fe;
        }

        .ia:hover {
            background-color: #bc13fe;
            color: white;
            box-shadow: 0 0 30px #bc13fe;
        }
    </style>
</head>
<body>

    <h1>Cocktail AI 🍸</h1>

    <div class="menu">
        <button class="btn-menu">📖 Catàleg de Còctels</button>
        <button class="btn-menu">🎛️ Gestió d'Inventari</button>
        <button class="btn-menu ia">✨ Demanar a la IA</button>
    </div>

</body>
</html>
