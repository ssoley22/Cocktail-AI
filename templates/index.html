<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="/static/css/base.css">
    <title>Cocktail IA - Inici</title>
    <style>
        body { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100dvh; padding: 20px; }

        .admin-link { position: absolute; top: 25px; right: 25px; text-decoration: none; font-size: 2.2rem; opacity: 0.2; transition: 0.4s; }
        .admin-link:hover { opacity: 1; transform: rotate(90deg); filter: drop-shadow(0 0 10px var(--color-primari)); }

        .capçalera { text-align: center; margin-bottom: 50px; }
        .capçalera .icona { font-size: 4rem; margin-bottom: 15px; }
        h1 { color: var(--color-primari); font-size: clamp(2.5rem, 10vw, 3.5rem); font-weight: 800; letter-spacing: 4px; margin: 0 0 15px; text-shadow: 0 0 20px rgba(123, 97, 255, 0.3); }

        .separador { display: flex; align-items: center; justify-content: center; gap: 15px; }
        .separador-linia { height: 2px; width: 60px; background: var(--color-vora-subtil); }
        .separador-text { color: #555; font-size: 0.9rem; letter-spacing: 5px; text-transform: uppercase; font-weight: bold; }

        /* Augmentat a 240px per botó per fer-los més grans */
        .grid-botons { display: grid; grid-template-columns: repeat(2, 240px); gap: 25px; }

        .boto { background: #0d0e1a; border: 2px solid #181b2e; border-radius: 25px; padding: 35px 25px; text-decoration: none; display: flex; flex-direction: column; align-items: flex-start; gap: 20px; transition: 0.3s; position: relative; }
        .boto:hover { border-color: var(--color-primari); transform: translateY(-5px); background: #141629;}
        .boto.destacat { background: #0f0d1f; border-color: var(--color-primari); }
        .boto.destacat:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(123,97,255,0.3); }

        .boto-icona { background: rgba(123,97,255,0.1); border-radius: 15px; width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; font-size: 2rem; flex-shrink: 0; }
        .destacat .boto-icona { background: rgba(123,97,255,0.18); }

        .boto-nom { color: white; font-weight: 700; font-size: 1.3rem; margin-bottom: 8px; }
        .boto-desc { color: #666; font-size: 0.9rem; line-height: 1.4; }
        .destacat .boto-desc { color: #8e77ff; }

        /* Badge IA */
        .badge-ia { position: absolute; top: 15px; right: 15px; font-size: 0.7rem; font-weight: 700; padding: 5px 10px; border-radius: 20px; letter-spacing: 1px; }
        .badge-ia.suau { background: rgba(123,97,255,0.15); color: var(--color-primari); border: 1px solid rgba(123,97,255,0.3); }
        .badge-ia.solid { background: var(--color-primari); color: white; }

        /* 📱 Adaptació Mòbil MANTINGUDA */
        @media (max-width: 768px) {
            .admin-link { display: none; }
            .capçalera .icona { font-size: 3rem; margin-bottom: 10px; }
            h1 { font-size: 2.2rem; }
            .separador-text { font-size: 0.75rem; }
            .separador-linia { width: 30px; }
            
            .grid-botons { grid-template-columns: 1fr; max-width: 360px; width: 100%; gap: 15px; }
            .boto { flex-direction: row; align-items: center; padding: 22px; border-radius: 20px; gap: 20px; }
            .boto-icona { width: 55px; height: 55px; font-size: 1.8rem; }
            .boto-nom { font-size: 1.2rem; margin-bottom: 4px; }
            .boto-desc { font-size: 0.85rem; }
            .badge-ia { top: 50%; transform: translateY(-50%); right: 15px; } /* Centra el badge al mòbil */
        }
    </style>
</head>
<body>
    <a href="/admin" class="admin-link" title="Configuració">⚙️</a>

    <div class="capçalera">
        <div class="icona">🍸</div>
        <h1>COCKTAIL IA</h1>
        <div class="separador">
            <div class="separador-linia"></div>
            <span class="separador-text">Tria com vols el teu còctel</span>
            <div class="separador-linia"></div>
        </div>
    </div>

    <div class="grid-botons">
        <a href="/manual" class="boto">
            <div class="boto-icona">📖</div>
            <div class="boto-info">
                <div class="boto-nom">Manual</div>
                <div class="boto-desc">Tria del catàleg complet</div>
            </div>
        </a>

        <a href="/aleatori" class="boto">
            <div class="boto-icona">🎲</div>
            <div class="boto-info">
                <div class="boto-nom">Aleatori</div>
                <div class="boto-desc">Deixa que et sorprenguem</div>
            </div>
        </a>

        <a href="/emocions" class="boto">
            <span class="badge-ia suau">IA</span>
            <div class="boto-icona">😊</div>
            <div class="boto-info">
                <div class="boto-nom">Emocions</div>
                <div class="boto-desc">La IA tria pel teu humor</div>
            </div>
        </a>

        <a href="/xat" class="boto destacat">
            <span class="badge-ia solid">IA</span>
            <div class="boto-icona">🤖</div>
            <div class="boto-info">
                <div class="boto-nom">Xat IA</div>
                <div class="boto-desc">Explica'm què vols</div>
            </div>
        </a>
    </div>
</body>
</html>
