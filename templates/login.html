<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="/static/css/base.css">
    <title>Accés Admin - Cocktail IA</title>
    <style>
        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .login-wrapper { width: 100%; max-width: 400px; text-align: center; padding: 20px; }
        .login-subtitol { color: var(--color-text-gris); font-size: 0.9rem; margin-bottom: 40px; }
        .btn-login { width: 100%; padding: 18px; background: var(--color-primari); color: white; border: none; border-radius: 16px; font-size: 1rem; font-weight: bold; letter-spacing: 1.5px; cursor: pointer; transition: 0.3s; margin-top: 12px; }
        .btn-login:hover { background: var(--color-primari-clar); transform: translateY(-2px); }
        .error { color: var(--color-error); font-size: 0.9rem; background: rgba(255,75,75,0.1); border: 1px solid rgba(255,75,75,0.2); padding: 12px; border-radius: 12px; margin-bottom: 20px; }
        .link-tornar { display: block; color: var(--color-text-fosc); text-decoration: none; font-size: 0.85rem; margin-top: 28px; transition: 0.3s; }
        .link-tornar:hover { color: var(--color-primari); }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div style="font-size: 2.5rem; margin-bottom: 12px;">⚙️</div>
        <h1>Accés Admin</h1>
        <p class="login-subtitol">Zona restringida al propietari</p>
        {% if error %}<div class="error">{{ error }}</div>{% endif %}
        <form method="POST" action="/login">
            <div class="camp-grup">
                <label>USUARI</label>
                <div class="camp-input"><span class="icona">👤</span><input type="text" name="username" placeholder="Nom d'usuari" required></div>
            </div>
            <div class="camp-grup">
                <label>CONTRASENYA</label>
                <div class="camp-input"><span class="icona">🔒</span><input type="password" name="password" placeholder="Contrasenya" required></div>
            </div>
            <button type="submit" class="btn-login">ENTRAR</button>
        </form>
        <a href="/" class="link-tornar">← Tornar a l'inici</a>
    </div>
</body>
</html>
