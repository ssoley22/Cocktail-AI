<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <title>Preparant - Cocktail IA</title>
    <style>
        body { 
            background: #05050a; color: white; font-family: 'Segoe UI', sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; margin: 0; overflow: hidden;
        }

        .container { text-align: center; width: 90%; max-width: 500px; }

        h1 { color: #7b61ff; font-size: 2.8rem; margin-bottom: 10px; text-shadow: 0 0 20px rgba(123, 97, 255, 0.3); }
        .nom-coctel { font-size: 1.5rem; color: #eee; margin-bottom: 40px; font-weight: 300; }

        /* ANIMACIÓ DE LA COCTELERA */
        .coctelera-box { font-size: 6rem; margin-bottom: 40px; display: inline-block; animation: shake 0.5s infinite; }
        
        @keyframes shake {
            0% { transform: rotate(0deg) translateY(0); }
            25% { transform: rotate(15deg) translateY(-10px); }
            50% { transform: rotate(0deg) translateY(0); }
            75% { transform: rotate(-15deg) translateY(-10px); }
            100% { transform: rotate(0deg) translateY(0); }
        }

        /* POSICIÓ A LA CUA */
        .cua-badge { 
            background: rgba(123, 97, 255, 0.1); border: 1px solid #7b61ff; 
            padding: 10px 20px; border-radius: 50px; color: #7b61ff;
            font-weight: bold; font-size: 0.9rem; margin-bottom: 30px; display: inline-block;
        }

        /* ESTATS EN TEMPS REAL */
        .estats-flux { display: flex; justify-content: space-between; width: 100%; margin-top: 20px; position: relative; }
        .estat { font-size: 0.8rem; color: #444; font-weight: bold; transition: 0.5s; position: relative; z-index: 2; }
        .estat.actiu { color: #7b61ff; transform: scale(1.1); }
        .estat.completat { color: #4caf50; }

        /* Línia de fons dels estats */
        .linia { position: absolute; top: 50%; left: 0; width: 100%; height: 2px; background: #222; z-index: 1; transform: translateY(-50%); }
        .linia-progress { position: absolute; top: 50%; left: 0; width: 0%; height: 2px; background: #7b61ff; z-index: 1; transform: translateY(-50%); transition: 1s; }

        /* MISSATGE FINAL */
        #missatge-final { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #05050a; z-index: 100; flex-direction: column; align-items: center; justify-content: center;
            animation: fadeIn 0.8s forwards;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="container">
        <div class="cua-badge" id="cua-text">Ets el 1r de la cua</div>
        
        <div class="coctelera-box">🫨🥤</div>
        
        <h1 id="titol-estat">Preparant...</h1>
        <div class="nom-coctel">{{ coctel.Nom_Coctel }}</div>

        <div class="estats-flux">
            <div class="linia"></div>
            <div class="linia-progress" id="linia-prog"></div>
            <div class="estat actiu" id="estat-1">ESPERANT</div>
            <div class="estat" id="estat-2">PREPARANT</div>
            <div class="estat" id="estat-3">LLEST!</div>
        </div>
    </div>

    <div id="missatge-final">
        <div style="font-size: 8rem;">🍸</div>
        <h1 style="color: #4caf50;">La teva beguda és llesta!</h1>
        <p style="color: #888; margin-top: 20px;">Gaudeix del teu {{ coctel.Nom_Coctel }}</p>
        <p style="color: #555; font-size: 0.8rem; margin-top: 50px;">Tornant a l'inici en 5 segons...</p>
    </div>

    <script>
        // Simulació dels estats (Això es podria connectar amb el Python real)
        const estats = [
            { label: "ESPERANT", progress: "0%", text: "Esperant...", cua: "Ets el 1r de la cua" },
            { label: "PREPARANT", progress: "50%", text: "Preparant...", cua: "S'està servint ara" },
            { label: "LLEST!", progress: "100%", text: "Finalitzant...", cua: "Recull la teva beguda" }
        ];

        let index = 0;
        const interval = setInterval(() => {
            index++;
            if (index < estats.length) {
                actualitzarEstat(index);
            } else {
                clearInterval(interval);
                mostrarFinal();
            }
        }, 4000); // Canvia d'estat cada 4 segons (simulat)

        function actualitzarEstat(i) {
            document.getElementById('titol-estat').innerText = estats[i].text;
            document.getElementById('cua-text').innerText = estats[i].cua;
            document.getElementById('linia-prog').style.width = estats[i].progress;
            
            // Marcar els estats visuals
            document.querySelectorAll('.estat').forEach((el, idx) => {
                if (idx < i) el.className = "estat completat";
                if (idx === i) el.className = "estat actiu";
                if (idx > i) el.className = "estat";
            });
        }

        function mostrarFinal() {
            document.getElementById('missatge-final').style.display = 'flex';
            setTimeout(() => {
                window.location.href = "/"; // Torna a l'inici automàticament
            }, 5000);
        }
    </script>

</body>
</html>
