<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="/static/css/base.css">
    <title>Xat IA - Cocktail IA</title>
    <style>
        /* ESTIL ORIGINAL EXACTE */
        body { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
        }
        

        /* Contenidor central flotant */
        .chat-container { 
            width: 90%; 
            max-width: 600px; 
            height: 85vh; 
            display: flex; 
            flex-direction: column; 
        }
        
        h1 { font-size: 2rem; color: var(--color-primari); text-align: center; margin-bottom: 20px; flex-shrink: 0; }

        /* Zona de missatges */
        #chat-box { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            overflow-y: auto; 
            padding-right: 5px;
            margin-bottom: 20px;
        }
        #chat-box::-webkit-scrollbar { width: 4px; }
        #chat-box::-webkit-scrollbar-thumb { background: var(--color-vora-subtil); border-radius: 10px; }

        /* Bombolles de xat */
        .bubble { padding: 20px; border-radius: 25px; max-width: 80%; line-height: 1.5; position: relative; }
        .user-bubble { background: var(--color-vora-subtil); align-self: flex-end; border-bottom-right-radius: 5px; border: 1px solid var(--color-vora); word-break: break-word; }
        .ai-bubble { background: var(--color-superficie); align-self: flex-start; border-bottom-left-radius: 5px; border: 1px solid var(--color-primari); }

        /* Targeta de còctel generada al xat (MOLT MILLORADA) */
        .coctel-card {
            background: linear-gradient(145deg, var(--color-superficie), var(--color-superficie-2));
            border: 1px solid var(--color-primari);
            box-shadow: 0 10px 25px rgba(123, 97, 255, 0.15);
            border-radius: 20px;
            padding: 25px; 
            margin-top: 10px; 
            text-align: center; 
            animation: fadeIn 0.5s forwards;
            align-self: center; /* La centrem perquè quedi com un resultat final */
            width: 90%;
        }
        .coctel-card h3 { font-size: 1.5rem; color: var(--color-primari); margin: 0 0 5px 0; }
        .coctel-desc { font-size: 0.9rem; color: #aaa; margin-bottom: 20px; font-style: italic; }
        
        .ingredients-grid {
            display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-bottom: 20px;
        }
        .ingredient-tag {
            display: inline-flex; align-items: center; background: rgba(123, 97, 255, 0.1); 
            color: #eee; padding: 8px 15px; border-radius: 12px; font-size: 0.9rem; 
            border: 1px solid rgba(123, 97, 255, 0.3);
        }
        .ingredient-tag strong { color: var(--color-primari); margin-left: 5px; font-size: 1rem; }
        
        .btn-confirmar-ia {
            display: inline-block; width: 80%; background: var(--color-primari); color: white; 
            padding: 15px; border-radius: 15px; text-decoration: none; font-weight: bold;
            transition: 0.3s;
        }
        .btn-confirmar-ia:hover { background: var(--color-primari-clar); transform: scale(1.02); }

        /* Comptador discret sota la bombolla */
        .msg-counter {
            font-size: 0.8rem; color: #666; margin: -10px 0 5px 20px; align-self: flex-start; font-weight: bold; animation: fadeIn 0.5s forwards;
        }

        /* Contenidor inferior d'input i botons de reinici */
        .input-container { flex-shrink: 0; width: 100%; }

        /* Camp d'entrada auto-expandible */
        .input-group { 
            display: flex; gap: 10px; background: var(--color-superficie); padding: 10px; 
            border-radius: 35px; border: 1px solid var(--color-vora); align-items: flex-end;
        }
        .input-group textarea { 
            flex: 1; background: transparent; border: none; color: white; 
            padding: 10px 20px; outline: none; font-size: 1rem; font-family: inherit;
            resize: none; overflow-y: auto; line-height: 24px;
            height: 24px; 
            max-height: 96px; 
            box-sizing: content-box;
        }
        .input-group textarea::-webkit-scrollbar { width: 4px; }
        .input-group textarea::-webkit-scrollbar-thumb { background: var(--color-vora); border-radius: 10px; }

        .btn-send { 
            background: var(--color-primari); border: none; color: white; 
            width: 45px; height: 45px; border-radius: 50%; 
            cursor: pointer; transition: 0.3s; display: flex; 
            align-items: center; justify-content: center; font-size: 1.2rem;
            margin-bottom: 2px; 
        }
        .btn-send:hover:not(:disabled) { transform: scale(1.1); background: var(--color-primari-clar); }
        
        /* El nou botó complet de Reiniciar */
        .btn-reset-full { 
            display: none; width: 100%; background: #f44336; color: white; 
            border: none; padding: 15px; border-radius: 35px; 
            font-size: 1.1rem; font-weight: bold; cursor: pointer; 
            transition: 0.3s; text-align: center; text-decoration: none;
            box-sizing: border-box; letter-spacing: 1px;
        }
        .btn-reset-full:hover { background: #d32f2f; }

        /* Animació punts */
        .typing { display: flex; gap: 5px; padding: 5px; }
        .dot { width: 8px; height: 8px; background: var(--color-primari); border-radius: 50%; animation: bounce 1.4s infinite ease-in-out; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <a href="/" class="btn-back">← INICI</a>

    <div class="chat-container">
        <h1>Explica'm què vols... 🤖</h1>

        <div id="chat-box">
            <div class="bubble ai-bubble">
                Hola! Soc la teva Cocktail IA. Digue'm com ha anat el dia o quins sabors t'agraden i et prepararé una recepta única.
            </div>
        </div>

        <div class="input-container">
            <div class="input-group" id="input-group">
                <textarea id="user-input" rows="1" placeholder="Ex: Vull algo refrescant amb llimona..."></textarea>
                <button class="btn-send" id="send-btn" onclick="enviarMissatge()">➔</button>
            </div>
            <button class="btn-reset-full" id="btn-reset-full" onclick="window.location.href='/reiniciar_xat'">REINICIAR XAT</button>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const inputGroup = document.getElementById('input-group');
        const btnResetFull = document.getElementById('btn-reset-full');
        let restants = {{ restants | default(3) }};
        // 1. Auto-expandir el textarea fins a 4 línies i fer scroll
        userInput.addEventListener('input', function() {
            this.style.height = '24px'; 
            this.style.height = Math.min(this.scrollHeight, 96) + 'px'; 
        });

        // 2. Controlar l'Enter vs Shift+Enter
        userInput.addEventListener('keydown', (e) => { 
            if(e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault(); 
                enviarMissatge(); 
            }
        });

        // 3. Comprovem si venim d'una pàgina amb el límit esgotat
        window.onload = function() {
            if (restants <= 0) activarModeReinici();
        }

        // 4. Activar la barra de Reiniciar (Substitueix totalment l'input group)
        function activarModeReinici() {
            inputGroup.style.display = 'none';
            btnResetFull.style.display = 'block';
        }

        async function enviarMissatge() {
            const text = userInput.value.trim();
            if (!text) return;

            // Mostrar bombolla usuari
            userInput.value = "";
            userInput.style.height = '24px'; 
            appendBubble('user-bubble', text);
            
            // Animació IA pensant
            const typingId = "typing-" + Date.now();
            const typingBubble = document.createElement('div');
            typingBubble.className = "bubble ai-bubble";
            typingBubble.id = typingId;
            typingBubble.innerHTML = '<div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
            chatBox.appendChild(typingBubble);
            scrollDown();

            try {
                const res = await fetch('/api/generar_xat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ missatge: text })
                });
                
                const data = await res.json();
                chatBox.removeChild(typingBubble);

                if (data.status === "ok") {
                    appendBubble('ai-bubble', data.resposta);
                    
                    // Si la IA envia una recepta, mostrem la targeta nova
                    if (data.tinc_recepta && data.dades_coctel) {
                        appendCoctelCard(data.dades_coctel);
                    }
                    
                    // Actualitzem missatges i mirem si hem de tancar (AQUESTA ÉS LA LÒGICA QUE HO BLINDA)
                    restants = data.restants;
                    if (restants > 0) {
                        const textAjuda = data.tinc_recepta ? 
                            `💬 Et queden ${restants} missatges si vols modificar la recepta.` : 
                            `💬 Et queden ${restants} missatges`;
                        appendCounterText(textAjuda);
                    } else {
                        activarModeReinici();
                    }

                } else {
                    appendBubble('ai-bubble', "He tingut un problema amb la meva memòria. Prova de reiniciar.");
                    activarModeReinici();
                }
            } catch (e) {
                chatBox.removeChild(typingBubble);
                appendBubble('ai-bubble', "Error de connexió. Revisa la xarxa.");
            }
        }

        function appendBubble(cls, txt) {
            const div = document.createElement('div');
            div.className = "bubble " + cls;
            div.innerText = txt; 
            chatBox.appendChild(div);
            scrollDown();
        }

        function appendCounterText(txt) {
            const div = document.createElement('div');
            div.className = "msg-counter";
            div.innerText = txt;
            chatBox.appendChild(div);
            scrollDown();
        }

        function appendCoctelCard(dades) {
            const card = document.createElement('div');
            card.className = "coctel-card";
            
            // Creem la graella visual dels ingredients
            let ingredientsHTML = '<div class="ingredients-grid">';
            if (dades.recepta) {
                for (const [liquid, ml] of Object.entries(dades.recepta)) {
                    ingredientsHTML += `<span class="ingredient-tag">${liquid}: <strong>${ml}ml</strong></span>`;
                }
            }
            ingredientsHTML += '</div>';

            card.innerHTML = `
                <h3>🍹 ${dades.nom}</h3>
                <p class="coctel-desc">Fórmula única generada en temps real per la nostra IA.</p>
                ${ingredientsHTML}
                <a href="/confirmacio_ia" class="btn-confirmar-ia">PREPARAR AQUESTA RECEPTA ✅</a>
            `;
            chatBox.appendChild(card);
            scrollDown();
        }

        function scrollDown() {
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
